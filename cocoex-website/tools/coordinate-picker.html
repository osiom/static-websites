<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coordinate Picker</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      color: #fff;
      font-family: monospace;
      cursor: crosshair;
      min-height: 100vh;
    }
    #coords {
      position: fixed;
      top: 10px;
      left: 10px;
      background: rgba(0,0,0,0.8);
      padding: 15px;
      border: 1px solid #333;
      z-index: 1000;
      font-size: 14px;
      min-width: 300px;
    }
    #coords h3 { margin-bottom: 10px; color: #0f0; }
    #live { color: #0ff; margin-bottom: 15px; }
    #points {
      max-height: 300px;
      overflow-y: auto;
      border-top: 1px solid #333;
      padding-top: 10px;
    }
    .point {
      display: flex;
      justify-content: space-between;
      padding: 3px 0;
      border-bottom: 1px solid #222;
    }
    .point:hover { background: #222; }
    #output {
      margin-top: 15px;
      padding-top: 10px;
      border-top: 1px solid #333;
    }
    #output pre {
      background: #111;
      padding: 10px;
      font-size: 12px;
      overflow-x: auto;
      white-space: pre-wrap;
    }
    button {
      background: #333;
      color: #fff;
      border: 1px solid #555;
      padding: 5px 10px;
      margin: 5px 5px 5px 0;
      cursor: pointer;
      font-family: monospace;
    }
    button:hover { background: #444; }
    .help {
      color: #888;
      font-size: 11px;
      margin-top: 10px;
    }
    #dot {
      position: fixed;
      width: 10px;
      height: 10px;
      background: #f00;
      border-radius: 50%;
      pointer-events: none;
      transform: translate(-50%, -50%);
      z-index: 999;
    }
    .saved-dot {
      position: fixed;
      width: 12px;
      height: 12px;
      background: #0f0;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      z-index: 998;
    }
    .saved-dot span {
      position: absolute;
      left: 15px;
      top: -3px;
      font-size: 10px;
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <div id="coords">
    <h3>Coordinate Picker</h3>
    <div id="live">Move mouse...</div>
    <div class="help">
      <b>Click</b> to save point | <b>Z</b> to undo | <b>C</b> to clear
    </div>
    <div id="points"></div>
    <div id="output">
      <button onclick="copyAbsolute()">Copy Absolute</button>
      <button onclick="copyNormalized()">Copy Normalized (0-1)</button>
      <pre id="code">[]</pre>
    </div>
  </div>
  <div id="dot"></div>

  <script>
    const dot = document.getElementById('dot');
    const live = document.getElementById('live');
    const pointsDiv = document.getElementById('points');
    const codeEl = document.getElementById('code');

    let points = [];
    let savedDots = [];

    document.addEventListener('mousemove', (e) => {
      const x = e.clientX;
      const y = e.clientY;
      const w = window.innerWidth;
      const h = window.innerHeight;

      dot.style.left = x + 'px';
      dot.style.top = y + 'px';

      live.innerHTML = `
        <b>Absolute:</b> x: ${x}, y: ${y}<br>
        <b>Normalized:</b> x: ${(x/w).toFixed(4)}, y: ${(y/h).toFixed(4)}<br>
        <b>Screen:</b> ${w} x ${h}
      `;
    });

    document.addEventListener('click', (e) => {
      if (e.target.closest('#coords')) return;

      const x = e.clientX;
      const y = e.clientY;
      const w = window.innerWidth;
      const h = window.innerHeight;

      points.push({
        x, y,
        nx: x / w,
        ny: y / h
      });

      // Create visual dot
      const savedDot = document.createElement('div');
      savedDot.className = 'saved-dot';
      savedDot.style.left = x + 'px';
      savedDot.style.top = y + 'px';
      savedDot.innerHTML = `<span>${points.length - 1}</span>`;
      document.body.appendChild(savedDot);
      savedDots.push(savedDot);

      updateDisplay();
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'z' || e.key === 'Z') {
        // Undo
        if (points.length > 0) {
          points.pop();
          const dot = savedDots.pop();
          if (dot) dot.remove();
          updateDisplay();
        }
      } else if (e.key === 'c' || e.key === 'C') {
        // Clear all
        points = [];
        savedDots.forEach(d => d.remove());
        savedDots = [];
        updateDisplay();
      }
    });

    function updateDisplay() {
      // Update points list
      pointsDiv.innerHTML = points.map((p, i) =>
        `<div class="point">
          <span>#${i}</span>
          <span>x:${p.x} y:${p.y}</span>
          <span>(${p.nx.toFixed(2)}, ${p.ny.toFixed(2)})</span>
        </div>`
      ).join('');

      // Update code output (normalized format matching your CONSTELLATION array)
      const normalized = points.map((p, i) =>
        `  { x: ${p.nx.toFixed(2)}, y: ${p.ny.toFixed(2)} },  // ${i}`
      ).join('\n');

      codeEl.textContent = `[\n${normalized}\n]`;
    }

    function copyAbsolute() {
      const text = JSON.stringify(points.map(p => ({ x: p.x, y: p.y })), null, 2);
      navigator.clipboard.writeText(text);
      alert('Copied absolute coordinates!');
    }

    function copyNormalized() {
      const text = `[\n${points.map((p, i) =>
        `  { x: ${p.nx.toFixed(2)}, y: ${p.ny.toFixed(2)} },  // ${i}`
      ).join('\n')}\n]`;
      navigator.clipboard.writeText(text);
      alert('Copied normalized coordinates!');
    }

    updateDisplay();
  </script>
</body>
</html>
